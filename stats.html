<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>DUNE</title>
</head>
<body>
<div class="flex_block_projects">
    <div class="left_block_projects">
        <div class="projects_main_logo">
            <h1 class="projects_text">DUNE</h1>
            <img src="/img/d_fix_projects.svg" class="d_fix_projects">
            <img src="/img/e_fix_projects_svg.svg" class="e_fix_projects">
            <img src="/img/e_fix_white_phone.png" class="e_fix_projects_white">
        </div>
<div class="button_block_projects">
    <button class="button_on_projects_classic" onclick="location.href='home.html'"><img src="/img/blogers.png"><p class="projects_classic_button_text">Блогеры</p></button>
    <button class="button_on_projects_classic" onclick="location.href='project.html'"><img src="/img/grey_projects.png"><p class="projects_classic_button_text">Проекты</p></button>
    <button class="button_on_projects_classic" onclick="location.href='posts.html'"><img src="/img/Posts.png"><p class="projects_classic_button_text">Посты</p></button>
    <button class="button_on_projects_classic" onclick="location.href='stats.html'"><img src="/img/yellow_results.png"><p class="projects_classic_button_text_yellow">Результаты</p></button>
    <button class="button_on_projects_classic" onclick="location.href='Applications.html'"><img src="/img/Applications.svg"><p class="projects_classic_button_text">Заявки</p></button>
</div>

<div>
    <button class="profile" onclick="location.href='profile.html'"><p class="nickname">Информация о профиле</p></button>
</div>
    </div>



    <div class="right_block_projects">
        <div class="search_projects_block">
            <img src="/img/search.svg">
            <input type="text" placeholder="Поиск" class="input_search">
            <img src="/img/filters.svg" class="img_searh_block_filters">
        </div class="pair_block">
        <div class="filters_block_text">
            <p class="filters_block_text_msg">Фильтрация</p>
            <p class="filters_block_text_msg">Всего найдено:</p>
        </div>
        <div class="filters_block_buttons">
            <button class="button_of_filters"><p>Соцсеть </p><img src="/img/gap.svg" class="filters_button_gap_svg"></button>
            <button class="button_of_filters"><p>Тип </p><img src="/img/gap.svg" class="filters_button_gap_svg"></button>
        </div>
        <div class="incoming_stat">
            <p class="rub_counter">1456<img src="/img/rub.png"></p>
            <p class="ff_text">Вы заработали за <br>последнюю неделю</p>
        </div>
        <div class="display_flex_of_stat_text">
            <p class="stat_of_stat_text">Статистика</p>
            <p class="time_of_stat">За последний: <span class="yellow_span">Месяц</span></p>
        </div>
        <div>
            <div class="display_flex_part_of_text">
                <p class="fff_text">Проект</p>
                <p class="fff_text">Время</p>
                <p class="fff_text">Статус</p>
            </div>
            <div class="stat_boxes_of_shadows">
                <div class="display_flex_stat_blocks">
                    <div class="display_flex_profile_prewiew">
                        <button class="profile_prewiew_button" onclick="location.href='project_info.html'"><img src="/img/Project logo.png" class="project_logo"></button>
                        <div class="status_block">
                            <p class="id">id: 0</p>
                            <p class="project_block_nickname">Okko</p>
                            <p class="date">30.08.2024</p>
                        </div>
                    </div>
                    <p class="date_of_stats">01.10.2024</p>
                    <img src="/img/ok.svg" class="img_stats_commiter">
                </div>
                <div class="display_flex_stat_blocks">
                    <div class="display_flex_profile_prewiew">
                        <button class="profile_prewiew_button" onclick="location.href='project_info.html'"><img src="/img/Project logo.png" class="project_logo"></button>
                        <div class="status_block">
                            <p class="id">id: 0</p>
                            <p class="project_block_nickname">Okko</p>
                            <p class="date">30.08.2024</p>
                        </div>
                    </div>
                    <p class="date_of_stats">01.10.2024</p>
                    <img src="/img/not_ok.svg" class="img_stats_commiter">
                </div>
            </div>
        </div>
    </div>
    </div>
    </div>
</body>
</html>
